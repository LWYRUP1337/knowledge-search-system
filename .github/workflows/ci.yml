name: CI/CD Pipeline

on:
  push:
    branches:
      - '**'
  pull_request:
    branches:
      - main

jobs:

  lint-backend:
    name: Lint Backend ruff
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: 'pip'

      - name: Install ruff
        run: pip install ruff

      - name: Run ruff
        run: ruff check backend/


  lint-frontend:
    name: Lint Frontend tsc
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        run: npm ci
        working-directory: frontend

      - name: Run TypeScript check
        run: npm run build
        working-directory: frontend


  test-backend:
    name: Test Backend pytest
    runs-on: ubuntu-latest
    needs: lint-backend

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: 'pip'

      - name: Install dependencies
        run: |
          pip install -r backend/requirements.txt pytest python-multipart httpx

      - name: Run pytest
        run: |
          pytest tests/ -v --tb=short \
            --ignore=tests/test_e2e_search.py


  test-integration:
    name: Integration Tests (Upload & Search)
    runs-on: ubuntu-latest
    needs: [lint-backend, lint-frontend]

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Create .env file
        run: cp .env.example .env

      - name: Start services
        run: docker compose up -d --build

      - name: Wait for backend
        run: |
          echo "Waiting for backend to become healthy..."
          for i in {1..60}; do
            if curl -sf http://localhost:8000/health > /dev/null 2>&1; then
              echo "Backend is ready (attempt $i)"
              exit 0
            fi
            echo "Attempt $i/60: backend not ready yet, retrying in 5s..."
            sleep 5
          done
          echo "Backend failed to become healthy after 60 attempts"
          docker compose logs backend --tail=50
          exit 1

      - name: Upload test document
        run: |
          echo "Test document" > test.txt
          HTTP_STATUS=$(curl -s -o /dev/null -w "%{http_code}" \
            -X POST http://localhost:8000/api/v1/documents/upload \
            -F "file=@test.txt")
          if [ "$HTTP_STATUS" = "200" ] || [ "$HTTP_STATUS" = "201" ]; then
            echo "Upload successful (HTTP $HTTP_STATUS)"
          else
            echo "Upload failed (HTTP $HTTP_STATUS)"
            exit 1
          fi

      - name: Search test
        run: |
          RESPONSE=$(curl -s "http://localhost:8000/api/v1/search?q=test")
          if echo "$RESPONSE" | grep -q '"results"'; then
            echo "Search works"
          else
            echo "Search failed"
            exit 1
          fi

      - name: Print logs if failed
        if: failure()
        run: |
          echo "Backend logs:"
          docker compose logs backend --tail=50
          echo "Elasticsearch logs:"
          docker compose logs elasticsearch --tail=30


  build-and-push:
    name: Build & Push Docker Images
    runs-on: ubuntu-latest
    needs: [lint-backend, lint-frontend, test-backend, test-integration]

    if: github.event_name == 'pull_request' && github.base_ref == 'main'

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build and push backend image
        uses: docker/build-push-action@v5
        with:
          context: ./backend
          push: true
          tags: |
            ${{ secrets.DOCKERHUB_USERNAME }}/knowledge-search-backend:latest
            ${{ secrets.DOCKERHUB_USERNAME }}/knowledge-search-backend:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Build and push frontend image
        uses: docker/build-push-action@v5
        with:
          context: ./frontend
          push: true
          tags: |
            ${{ secrets.DOCKERHUB_USERNAME }}/knowledge-search-frontend:latest
            ${{ secrets.DOCKERHUB_USERNAME }}/knowledge-search-frontend:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
